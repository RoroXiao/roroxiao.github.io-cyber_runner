<!DOCTYPE html>
<!--
  Cyber Runner v6 — 马力欧风格重制版
  2026-06-15 | 纯 Canvas 2D | Powered by GLM
  可变跳跃 · 踩踏敌人 · 浮动平台 · 问号方块 · 旋转金币 · 动态天空
-->
<html lang="zh-CN"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>赛博跑酷 · Cyber Runner</title>
<style>
:root{--c1:#00E5FF;--c2:#FF4081;--c3:#FFD740;--c4:#B388FF;--bg:#0d1117}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Orbitron','Microsoft YaHei',system-ui,sans-serif;color:#e0e0e0;touch-action:none;user-select:none;-webkit-user-select:none}
canvas#gc{display:block;position:fixed;top:0;left:0;z-index:1}
.overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;transition:opacity .3s,visibility .3s}
.overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
.panel{background:rgba(13,17,23,.95);border-radius:24px;padding:clamp(18px,4vw,34px);text-align:center;border:1px solid rgba(255,255,255,.08);max-width:380px;width:88%;box-shadow:0 0 80px rgba(0,229,255,.06)}
.panel.wide{max-width:460px}
.ptitle{font-size:clamp(1.9rem,7vw,3rem);font-weight:900;letter-spacing:.04em;background:linear-gradient(135deg,#00E5FF,#B388FF,#FF4081);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:titlePulse 3s ease-in-out infinite}
@keyframes titlePulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.25)}}
.psub{font-size:.65em;letter-spacing:.55em;color:rgba(255,255,255,.15);margin:.3em 0 1em}
.char-canvas{max-width:90%;cursor:pointer;border-radius:16px;margin-bottom:.6em}
.demo-canvas{display:block;max-width:88%;width:340px;border-radius:14px;margin:.5em auto;border:1px solid rgba(0,229,255,.15);background:rgba(13,17,23,.6)}
.name-in{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:.55em .9em;color:#d0d0d0;font-family:inherit;font-size:.82em;width:clamp(140px,44vw,220px);outline:none;text-align:center;transition:border-color .3s}
.name-in:focus{border-color:var(--c1)}
.btn{padding:.6em 1.7em;border-radius:10px;border:none;font-family:inherit;font-size:.8em;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.06em;text-transform:uppercase}
.btn-go{background:linear-gradient(135deg,#00E5FF,#B388FF);color:#0d1117}
.btn-go:hover:not(:disabled){box-shadow:0 0 24px rgba(0,229,255,.4);transform:translateY(-1px)}
.btn-go:disabled{opacity:.25;cursor:not-allowed;transform:none;box-shadow:none}
.btn-gh{background:rgba(255,255,255,.05);color:#aaa;border:1px solid rgba(255,255,255,.1)}
.btn-gh:hover{background:rgba(255,255,255,.1)}
.btn-pk{background:rgba(255,64,129,.12);color:#FF4081;border:1px solid rgba(255,64,129,.2)}
.btn-pk:hover{background:rgba(255,64,129,.22)}
.over-title{font-size:1.2em;font-weight:900;letter-spacing:.08em;margin-bottom:.3em}
.over-title.gold{color:#FFD740}.over-title.pink{color:#FF4081}.over-title.cyan{color:#00E5FF}
.score-lg{font-size:2.8em;font-weight:900;margin:.05em 0;text-shadow:0 0 20px rgba(0,229,255,.25)}
.best-sm{font-size:.65em;color:rgba(255,255,255,.3);margin-bottom:.8em}
.best-sm span{color:#FFD740;font-weight:700}
.btn-row{display:flex;gap:.55em;justify-content:center;flex-wrap:wrap;margin-top:.3em}
.glm-tip-box{font-size:.6em;color:rgba(255,255,255,.28);margin:.4em 0;letter-spacing:.04em;line-height:1.5}
.pulse{animation:pulseAnim .5s ease-in-out infinite alternate}
@keyframes pulseAnim{from{transform:scale(1)}to{transform:scale(1.06)}}
.hud-sc{position:fixed;top:clamp(8px,2vw,16px);left:clamp(8px,2vw,16px);z-index:15;pointer-events:none;font-size:clamp(1.3rem,4.5vw,2.2rem);font-weight:900;letter-spacing:.04em;text-shadow:0 0 12px rgba(0,229,255,.3)}
.hud-rt{position:fixed;top:clamp(8px,2vw,16px);right:clamp(8px,2vw,16px);z-index:15;pointer-events:none;text-align:right}
.hud-best{font-size:.58em;color:rgba(255,255,255,.22)}.hud-name{font-size:.52em;color:rgba(255,255,255,.12);margin-top:2px}
.pause-btn{position:fixed;top:clamp(8px,2vw,16px);right:clamp(8px,2vw,16px);z-index:18;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#888;font-size:1.05em;width:32px;height:32px;border-radius:50%;cursor:pointer;display:none;transition:all .2s}
.pause-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.quit-btn{position:fixed;top:clamp(8px,2vw,16px);right:clamp(48px,6vw,60px);z-index:18;background:rgba(255,64,129,.1);border:1px solid rgba(255,64,129,.18);color:#FF4081;font-size:.85em;width:32px;height:32px;border-radius:50%;cursor:pointer;display:none;transition:all .2s;font-family:inherit;line-height:32px;text-align:center;padding:0}
.quit-btn:hover{background:rgba(255,64,129,.22);color:#ff7096;box-shadow:0 0 12px rgba(255,64,129,.2)}
.skill-btn{position:fixed;bottom:clamp(12px,3vw,24px);right:clamp(12px,3vw,24px);z-index:18;background:rgba(179,136,255,.12);border:1px solid rgba(179,136,255,.18);color:#B388FF;font-size:1.2em;width:44px;height:44px;border-radius:50%;cursor:pointer;display:none;transition:all .2s;font-family:inherit;line-height:44px;text-align:center;padding:0}
.skill-btn:hover{background:rgba(179,136,255,.22);color:#d4b8ff;box-shadow:0 0 16px rgba(179,136,255,.3)}
.skill-btn:active{transform:scale(.9)}
.toast{position:fixed;bottom:16%;left:50%;transform:translateX(-50%);background:rgba(13,17,23,.9);padding:.35em 1.1em;border-radius:10px;font-size:.68em;letter-spacing:.06em;opacity:0;transition:opacity .3s;z-index:25;pointer-events:none;border:1px solid rgba(0,229,255,.15);white-space:nowrap}
.toast.on{opacity:1}
.glm-badge{position:fixed;bottom:clamp(8px,2vw,14px);right:clamp(8px,2vw,14px);z-index:16;pointer-events:none;font-size:.5em;color:rgba(255,255,255,.08);letter-spacing:.14em;display:none}
.glm-badge b{color:#B388FF;font-weight:400}
.glm-tip{position:fixed;bottom:clamp(56px,11vw,90px);left:50%;transform:translateX(-50%);z-index:16;pointer-events:none;font-size:.58em;color:rgba(255,255,255,.32);text-align:center;max-width:82vw;opacity:0;transition:opacity .6s;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style>
</head><body>

<canvas id="gc"></canvas>

<!-- Menu -->
<div class="overlay" id="mo">
  <div class="panel wide">
    <div class="ptitle">赛博跑酷</div>
    <div class="psub">C Y B E R · R U N N E R</div>
    <canvas class="char-canvas" id="ccv" width="360" height="160"></canvas>
    <canvas class="demo-canvas" id="dcv" width="340" height="140" style="display:none"></canvas>
    <div style="margin-bottom:.7em"><input class="name-in" id="ni" placeholder="输入角色名称..." maxlength="12"></div>
    <button class="btn btn-go" id="sb" disabled>选择角色后开始</button>
    <div style="margin-top:.8em;font-size:.5em;color:rgba(255,255,255,.12);letter-spacing:.15em">
      由 <b style="color:#B388FF;font-weight:400">G</b><b style="color:#00E5FF;font-weight:400">L</b><b style="color:#FF4081;font-weight:400">M</b> 驱动
    </div>
  </div>
</div>

<!-- Pause -->
<div class="overlay hidden" id="po">
  <div class="panel"><div class="over-title cyan">暂停</div>
    <div style="margin:.6em 0"><button class="btn btn-go" id="rb">继续</button></div>
    <button class="btn btn-gh" id="q1">返回菜单</button>
  </div>
</div>

<!-- Game Over -->
<div class="overlay hidden" id="oo">
  <div class="panel">
    <div class="over-title" id="ot">游戏结束</div>
    <div class="score-lg" id="os">0</div>
    <div class="best-sm" id="ob">最高 <span>0</span></div>
    <div class="glm-tip-box" id="gtb"></div>
    <div class="btn-row">
      <button class="btn btn-go" id="re">再来</button>
      <button class="btn btn-gh" id="q2">换角色</button>
    </div>
  </div>
</div>

<!-- HUD -->
<div class="hud-sc" id="hs" style="display:none">0</div>
<div class="hud-rt" id="hr" style="display:none"><div class="hud-best">最高 <span id="hbs">0</span></div><div class="hud-name" id="hn"></div></div>
<button class="pause-btn" id="pb">⏸</button>
<button class="quit-btn" id="qb">✕</button>
<button class="skill-btn" id="skb">⚡</button>
<div class="toast" id="to"></div>
<div class="glm-badge" id="gb">Powered by <b>GLM</b></div>
<div class="glm-tip" id="gt"></div>

<script>
/* ================================================================
   Cyber Runner v6 — Mario-Inspired
   ================================================================ */

// ── DOM ──────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const D={
  cv:$('gc'),mo:$('mo'),ccv:$('ccv'),dcv:$('dcv'),ni:$('ni'),sb:$('sb'),
  po:$('po'),rb:$('rb'),q1:$('q1'),oo:$('oo'),ot:$('ot'),os:$('os'),
  ob:$('ob'),gtb:$('gtb'),re:$('re'),q2:$('q2'),
  hs:$('hs'),hr:$('hr'),hbs:$('hbs'),hn:$('hn'),pb:$('pb'),qb:$('qb'),skb:$('skb'),to:$('to'),gb:$('gb'),gt:$('gt')
};

// ── Config ──────────────────────────────────────────────
const C={
  DPR:Math.min(devicePixelRatio||1,2),
  GR:0.76, // ground ratio
  G:0.55, JV:-15, // gravity, jump velocity (Mario-like high arc)
  HOLD_BOOST:0.54, // upward boost per frame while jump held
  MAX_HOLD:20, // max frames to hold boost
  COYOTE_FRAMES:6, // frames of grace after leaving ground (Mario coyote time)
  JUMP_BUF_FRAMES:6, // frames to buffer jump input before landing
  SHORT_HOP_VY:-4, // velocity cap on jump release (short hop)
  MIN_SLIDE_FRAMES:12, // minimum slide frames (safety, can't stand up mid-barrier)
  // Characters
  CH:[
    {id:'cat',  name:'霓虹猫', c1:'#00E5FF',c2:'#E0F7FA',jM:1.08,hM:1,   dj:true, desc:'二段跳·空中冲刺',skill:'空中闪避冲刺(Shift/X)'},
    {id:'dog',  name:'霓虹狗', c1:'#FFB74D',c2:'#FFF8E1',jM:0.95,hM:0.82,dj:false,desc:'坚韧·小碰撞',skill:'铁壁滑铲(Shift/X)'},
    {id:'bunny',name:'霓虹兔', c1:'#FF4081',c2:'#FCE4EC',jM:1,   hM:1,   dj:true, desc:'二段跳·滑翔',skill:'空中滑翔(Shift/X)'}
  ],
  // Scenes
  SC:[
    {n:'霓虹平原', sky:['#4a90d9','#1a2a50'],ac:'#00E5FF',gr:'#0d2818',ob:['spike'],ene:['bot1'],minS:0},
    {n:'数据峡谷', sky:['#5b3a8c','#1a1030'],ac:'#B388FF',gr:'#1a1a30',ob:['spike','barrier','hover'],ene:['bot1','bot2'],minS:300},
    {n:'深渊都市', sky:['#7b2d5c','#1a0a1a'],ac:'#FF4081',gr:'#1a0a1e',ob:['spike','barrier','hover','moving'],ene:['bot1','bot2','bot3'],minS:900},
    {n:'核心地狱', sky:['#8b3a1a','#1a0606'],ac:'#FF6D00',gr:'#1a0808',ob:['spike','barrier','hover','moving','laser'],ene:['bot1','bot2','bot3','fly1'],minS:2000}
  ],
  OB:{spike:[28,36],barrier:[64,18],hover:[48,20],moving:[28,32],laser:[110,8]},
  COIN_R:12,
  BASE_SPD:3.2, MAX_SPD:14, SPD_INC:0.0003,
  GLM_TIPS:[
    '按住跳跃键可以跳得更高！轻点是小跳，按住是大跳。',
    '跳到敌人头顶可以踩扁它们，还能加分！',
    '高处的平台上有更多金币，还有道具。',
    '问号方块从下方顶开，道具会弹出来。',
    '连击翻倍金币！1.5秒内连续吃币别断。',
    '滑铲能穿过低矮障碍，按向下键或点屏幕下半部。',
    '护盾期间无视一切伤害，冲就完了。',
    '磁铁+加速是最强刷分组合。',
    '幽灵形态可以直接穿过所有障碍和敌人。',
    '每个新场景都有新的敌人类型，小心应对。'
  ]
};

// ── State ───────────────────────────────────────────────
let W,H,gy; // ground Y
let gs='menu'; // menu|playing|paused|over
let ci=-1,ch=null;
let pl=null, obs=[], enemies=[], coins=[], platforms=[], blocks=[], pups=[], pts=[], txts=[];
let sc=0, ccnt=0, dist=0, spd=C.BASE_SPD;
let fr=0, si=0, best=0;
let gt0=0, pt0=0, tpt=0; // game start, pause start, total pause
let slide=0, djmp=false, jmpHeld=false, jmpTimer=0;
let coyote=0, jumpBuf=0; // Coyote Time & Jump Buffer (Mario feel)
let skillCd=0; // skill cooldown frames
let combo=0, comboT=0, maxCombo=0;
let shake=0, milestone=150;
let ap={}; // active powerups
let maf=0, actx=null;
let bgmO=null,bgmG=null;

// ── Helpers ─────────────────────────────────────────────
function rng(a,b){return a+Math.random()*(b-a)}
function ri(a,b){return Math.floor(rng(a,b+1))}
function crc(cx,cy,cr,rx,ry,rw,rh){
  const nx=Math.max(rx,Math.min(cx,rx+rw)),ny=Math.max(ry,Math.min(cy,ry+rh));
  return (cx-nx)**2+(cy-ny)**2<cr*cr;
}
function rcc(a,b,c,d,e,f,g,h){return a<e+g&&a+c>e&&b<f+h&&b+d>f}

// ── Audio ───────────────────────────────────────────────
function ea(){
  if(!actx) try{actx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}
  if(actx&&actx.state==='suspended') actx.resume();
  return actx;
}
function sfx(f0,f1,d,t,v){
  const a=ea();if(!a)return;
  try{const o=a.createOscillator(),g=a.createGain();o.type=t||'sine';o.connect(g);g.connect(a.destination);
  const tt=a.currentTime;o.frequency.setValueAtTime(f0,tt);if(f1!==f0)o.frequency.linearRampToValueAtTime(f1,tt+d);
  g.gain.setValueAtTime(v||.08,tt);g.gain.linearRampToValueAtTime(0,tt+d);o.start(tt);o.stop(tt+d+.01)}catch(e){}
}
function bgmStart(){
  const a=ea();if(!a)return;bgmStop();
  bgmO=a.createOscillator();bgmG=a.createGain();bgmO.type='triangle';bgmO.frequency.value=82;
  bgmG.gain.value=.012;const f=a.createBiquadFilter();f.type='lowpass';f.frequency.value=300;
  bgmO.connect(f);f.connect(bgmG);bgmG.connect(a.destination);bgmO.start();
}
function bgmStop(){try{if(bgmO){bgmO.stop();bgmO.disconnect()}}catch(e){}try{if(bgmG)bgmG.disconnect()}catch(e){}bgmO=null;bgmG=null}

// ── Toast / Tips ────────────────────────────────────────
let _ttid;
function toast(m,c){const t=D.to;t.textContent=m;t.className='toast on';if(c)t.style.borderColor=c;
  clearTimeout(_ttid);_ttid=setTimeout(()=>t.className='toast',1800)}
let _tgid;
function glmTip(m){const t=D.gt;t.textContent=m;t.style.opacity='1';
  clearTimeout(_tgid);_tgid=setTimeout(()=>t.style.opacity='0',4000)}

// ── Time ────────────────────────────────────────────────
function et(){return gt0?(Date.now()-gt0-tpt)/1000:0}

// ── State Machine ───────────────────────────────────────
function rs(){
  pl=null;obs=[];enemies=[];coins=[];platforms=[];blocks=[];pups=[];pts=[];txts=[];
  sc=0;ccnt=0;dist=0;spd=C.BASE_SPD;fr=0;si=0;gt0=0;pt0=0;tpt=0;
  slide=0;djmp=false;jmpHeld=false;jmpTimer=0;
  coyote=0;jumpBuf=0;skillCd=0;
  combo=0;comboT=0;maxCombo=0;shake=0;milestone=150;ap={};
}
function spdCalc(){
  const e=et();if(e<5)return 2.6;
  let s=C.BASE_SPD+Math.max(0,e-5)*C.SPD_INC;
  if(ap.boost)s*=1.4;return Math.min(C.MAX_SPD,s);
}
function scIdx(){
  let s=0;for(let i=C.SC.length-1;i>=0;i--){if(sc>=C.SC[i].minS){s=i;break}}return s;
}

// ── Spawning ────────────────────────────────────────────
function spOb(){
  const sc2=C.SC[si],pool=sc2.ob,type=pool[ri(0,pool.length-1)];
  const[ow,oh]=C.OB[type];
  if(type==='laser'){
    const gapY=rng(60,130);
    // Lower beam sits on ground: y=gy, collision box extends up
    obs.push({type,x:W+80,y:gy,w:ow,h:oh,oy:0,mv:false});
    // Upper beam floats above gap: y=gy-gapY-h, collision box extends up
    obs.push({type,x:W+80,y:gy-oh-gapY,w:ow,h:oh,oy:0,mv:false});
    return;
  }
  const mv=si>=2&&Math.random()<.3;
  obs.push({type,x:W+40+rng(0,50),y:gy,w:ow,h:oh,oy:0,mv,md:mv?(Math.random()<.5?'v':'h'):null,mr:oh*.3+rng(0,12),mp:rng(0,6.28),ms:rng(.025,.055)});
}
function spEnemy(){
  const pool=C.SC[si].ene,type=pool[ri(0,pool.length-1)];
  if(type==='fly1'){
    const fy=rng(gy*.2,gy*.55);
    enemies.push({type,x:W+60,y:fy,w:24,h:20,vy:0,alive:true,squash:1,homeY:fy,amp:rng(8,20),ph:rng(0,6.28)});
  }else{
    enemies.push({type,x:W+60,y:gy,w:26,h:26,vy:0,alive:true,squash:1,walkPh:rng(0,6.28)});
  }
}
function spCoin(){
  // 随机高低排列
  if(Math.random()<.6){
    const by=20+rng(0,85);coins.push({x:W+30,y:gy-by,got:false,ph:rng(0,6.28)});
  }
  // 弧线金币组
  if(Math.random()<.4){
    const cy=gy-rng(50,120);
    for(let i=0;i<ri(2,5);i++){
      const a=i/(4)*Math.PI;
      coins.push({x:W+40+i*22,y:cy-Math.sin(a)*30,got:false,ph:rng(0,6.28)});
    }
  }
}
function spPlat(){
  const ph=rng(gy*.4,gy*.62),pw=rng(70,140);
  platforms.push({x:W+40,y:ph,w:pw,h:12});
}
function spBlock(){
  const by=gy-rng(45,110);
  blocks.push({x:W+60+rng(0,80),y:by,w:30,h:30,used:false,bounce:0,item:['shield','magnet','boost','ghost'][ri(0,3)]});
}
function spPup(x,y,item){
  pups.push({id:item,x,y,vy:-3,got:false,ph:rng(0,6.28),life:300});
}

// ── Update ──────────────────────────────────────────────
function update(){
  fr++;const el=et();spd=spdCalc();dist+=spd;
  const bm=ap.boost?2:1;
  sc=Math.floor(dist/26)+ccnt*10*bm;

  // Scene switch
  const ns=scIdx();
  if(ns!==si){si=ns;const scc=C.SC[ns];toast('📍 '+scc.n,scc.ac);if(ns>0)glmTip(C.GLM_TIPS[ri(0,C.GLM_TIPS.length-1)])}

  // Milestone
  if(sc>=milestone){toast('🏆 '+milestone+' 分!','#FFD740');sfx(600,900,.14,'sine',.1);milestone+=Math.min(milestone+150,5000)}

  // ── Player physics (Mario-style) ──
  // 1) Gravity
  pl.vy+=C.G;
  // 2) Variable jump: hold boost
  if(jmpHeld&&pl.vy<0&&jmpTimer<C.MAX_HOLD&&gs==='playing'){
    pl.vy+=C.HOLD_BOOST;jmpTimer++;
  }
  // 3) Apply velocity
  pl.y+=pl.vy;

  // 4) Ground & platform landing detection
  let landed=false;
  // Ground
  if(pl.y>=gy){pl.y=gy;pl.vy=0;landed=true;}
  // Platforms (one-way: only land from above)
  else{
    for(const p of platforms){
      const pt=p.y-p.h;
      // Player feet cross platform top from above
      if(pl.y>=pt&&pl.y-pl.vy<=pt&&pl.x+pl.w>p.x+4&&pl.x<p.x+p.w-4){
        pl.y=pt;pl.vy=0;landed=true;break;
      }
    }
  }

  // 5) Track on-ground state properly (every frame, not just on jp transition)
  if(landed){
    pl.og=true;pl.jp=false;
    if(pl.sqT<=0&&pl.sq!==1){pl.sq=1} // reset squash on landing
    // Landing squash (only on transition from air → ground)
    if(pl.vy!==0||!pl._wasLanded){pl.sq=.78;pl.sqT=6}
    if(slide<=0)pl.h=38;
    coyote=C.COYOTE_FRAMES; // refresh coyote time on landing
    djmp=false;
    // Jump buffer: if buffered, execute immediately
    if(jumpBuf>0){doJump();jumpBuf=0}
  }else{
    // In air: consume coyote time
    if(coyote>0)coyote--;
    pl.og=false;
  }
  pl._wasLanded=landed;

  pl.af++;pl.sqT=Math.max(0,pl.sqT-1);if(pl.sqT<=0)pl.sq=1+(1-pl.sq)*.45;

  // Jump buffer countdown (even when not on ground)
  if(jumpBuf>0)jumpBuf--;

  // 6) Slide system: held-based with minimum duration safety
  if(slide>0){
    slide--; // minimum safety countdown
    pl.h=18;
  }else if(pl.og&&_slideHeld){
    // Still holding down → keep sliding
    pl.h=18;
  }else if(pl.og&&pl.h!==38){
    pl.h=38; // stand up
  }

  // 7) Skill physics
  if(skillCd>0)skillCd--;
  // Bunny glide: cap falling speed
  if(pl.gliding&&pl.vy>1.5){pl.vy=1.5}
  // Cat dash: already handled via ap.shield (no extra physics needed)
  // Deactivate glide on landing
  if(pl.og&&pl.gliding){pl.gliding=false}

  // Trail
  if(fr%3===0){pl.trail.push({x:pl.x,y:pl.y,w:pl.w,h:pl.h,a:.4});if(pl.trail.length>5)pl.trail.shift()}
  pl.trail.forEach(t=>t.a-=.08);pl.trail=pl.trail.filter(t=>t.a>0);

  // ── Powerup timers ──
  for(const k in ap){ap[k]--;if(ap[k]<=0)delete ap[k]}
  // Combo timer
  if(comboT>0){comboT--;if(comboT<=0){combo=0}}

  // ── Spawning ──
  const el2=et();
  const lob=obs.length?Math.max(...obs.map(o=>o.x+o.w)):0;
  const gap=el2<8?520:el2<25?380:el2<55?290:240;
  if(lob<W-gap)spOb();
  if(el2>5){
    const len=enemies.length?Math.max(...enemies.map(e=>e.x+e.w)):0;
    if(len<W-rng(300,500))spEnemy();
  }
  if(Math.random()<(el2<5?.1:.045))spCoin();
  const lpl=platforms.length?Math.max(...platforms.map(p=>p.x+p.w)):0;
  if(lpl<W-rng(200,400)&&platforms.length<4)spPlat();
  const lbl=blocks.length?Math.max(...blocks.map(b=>b.x+b.w)):0;
  if(lbl<W-rng(350,600)&&blocks.length<3)spBlock();

  // ── Move entities ──
  obs.forEach(o=>{o.x-=spd;if(o.mv){if(o.md==='v')o.oy=Math.sin(fr*o.ms+o.mp)*o.mr;else o.x+=Math.sin(fr*o.ms*.7+o.mp)*1.3}});
  obs=obs.filter(o=>o.x+o.w>-70);
  enemies.forEach(e=>{
    e.x-=spd;
    if(e.type==='fly1'){e.y=e.homeY+Math.sin(fr*.03+e.ph)*e.amp}
    else{e.walkPh+=.04}
  });
  enemies=enemies.filter(e=>e.x>-60);
  coins.forEach(c=>{c.ph+=.07});
  coins.forEach(c=>{
    if(ap.magnet&&pl&&Math.hypot(pl.x+pl.w/2-c.x,pl.y-pl.h/2-c.y)<90){
      const a=Math.atan2(pl.y-pl.h/2-c.y,pl.x+pl.w/2-c.x);
      c.x+=Math.cos(a)*9;c.y+=Math.sin(a)*9;
    }else{
      c.x-=spd;
    }
  });
  coins=coins.filter(c=>c.x>-50&&!c.got);
  platforms.forEach(p=>p.x-=spd);platforms=platforms.filter(p=>p.x+p.w>-20);
  blocks.forEach(b=>{b.x-=spd;if(b.bounce>0)b.bounce=Math.max(0,b.bounce-1)});blocks=blocks.filter(b=>b.x+b.w>-20);
  pups.forEach(p=>{p.x-=spd;p.vy+=C.G*.5;p.y+=p.vy;p.ph+=.06;p.life--});pups=pups.filter(p=>p.life>0&&!p.got&&p.x>-40);

  // ── Collision: Obstacles ──
  if(!ap.shield&&!ap.ghost){
    const px=pl.x+5,py=pl.y-pl.h+3,pw=pl.w-10,ph2=Math.max(4,pl.h-8)*ch.hM;
    for(const o of obs){
      const oy=o.y-o.h-(o.oy||0);
      if(rcc(px,py,pw,ph2,o.x,oy,o.w,o.h)){die();return}
    }
  }
  // ── Collision: Enemies (Mario-style stomp) ──
  if(!ap.shield&&!ap.ghost){
    const px=pl.x+5,py=pl.y-pl.h+3,pw=pl.w-10,ph2=Math.max(4,pl.h-8)*ch.hM;
    for(const e of enemies){
      if(!e.alive)continue;
      const eTop=e.y-e.h, eMid=e.y-e.h*.4; // enemy top & 40% line
      const eBox={x:e.x-e.w/2,y:eTop,w:e.w,h:e.h};
      if(rcc(px,py,pw,ph2,eBox.x,eBox.y,eBox.w,eBox.h)){
        // Stomp: player's feet are above enemy 40% line AND any downward trend
        // (includes coyote-time "walking off edge onto enemy" case)
        const pBot=pl.y; // player feet y
        if(pl.vy>=0&&pBot<=eMid){
          e.alive=false;e.squash=.3;
          pl.vy=-8;pl.jp=true;pl.og=false; // bounce up
          sfx(500,900,.08,'square',.08);sc+=25;
          txts.push({x:e.x,y:eTop-8,vy:-2.5,life:25,ml:25,t:'+25',c:'#FFD740',s:14});
          for(let i=0;i<8;i++)pts.push({x:e.x,y:eTop,vx:rng(-3,3),vy:rng(-5,-1),life:ri(10,22),ml:22,c:'#FFD740',sz:rng(1.5,3.5)});
        }else{
          // Side/under collision → die
          die();return;
        }
      }
    }
  }
  // ── Collision: Coins ──
  const px2=pl.x+4,py2=pl.y-pl.h+2,pw2=pl.w-8,ph3=Math.max(4,pl.h-8);
  for(const c of coins){
    if(c.got)continue;
    if(crc(c.x,c.y,C.COIN_R,px2,py2,pw2,ph3)){
      c.got=true;ccnt++;
      combo++;comboT=90;if(combo>maxCombo)maxCombo=combo;
      const cm=combo>1?Math.min(1+(combo-1)*.5,3):1;
      sc+=Math.floor(10*bm*cm);
      sfx(700+combo*40,1050,.05,'sine',.07);
      for(let i=0;i<3;i++)pts.push({x:c.x,y:c.y,vx:rng(-1.5,1.5),vy:rng(-2.5,-.8),life:ri(8,18),ml:18,c:'#FFD740',sz:rng(1.2,2.5)});
      if(combo>=3)txts.push({x:c.x,y:c.y-5,vy:-1.5,life:22,ml:22,t:combo+'x',c:'#FFD740',s:10+combo*2});
    }
  }
  // ── Collision: Blocks (swept detection to prevent tunneling) ──
  for(const b of blocks){
    if(b.used)continue;
    const bx=b.x,by=b.y-b.h;
    const pHeadCurr=pl.y-pl.h;
    const pHeadPrev=(pl.y-pl.vy)-pl.h; // previous frame head position
    // Swept check: head crossed block bottom between prev and curr frame
    // Also allow a generous margin for near-misses
    const margin=4; // tolerance pixels
    if(pl.x+pl.w>bx+margin&&pl.x<bx+b.w-margin){
      // Head is in block zone (between block top and block bottom + margin)
      if(pHeadCurr<=by+margin&&pHeadPrev>=by-margin&&pl.vy<0){
        b.used=true;b.bounce=8;pl.vy=Math.min(pl.vy,3); // cap upward velocity, push down
        sfx(400,800,.08,'triangle',.08);
        spPup(b.x+b.w/2,by-10,b.item);
        for(let i=0;i<6;i++)pts.push({x:b.x+b.w/2,y:by,vx:rng(-2,2),vy:rng(-3,-1),life:ri(10,20),ml:20,c:'#FFD740',sz:rng(1,3)});
      }
    }
  }
  // ── Collision: Powerups ──
  for(const p of pups){
    if(p.got)continue;
    if(crc(p.x,p.y,14,px2,py2,pw2,ph3)){
      p.got=true;
      const dur={shield:360,magnet:480,boost:300,ghost:300}[p.id];
      if(ap[p.id])ap[p.id]+=dur;else ap[p.id]=dur;
      const names={shield:'🛡 护盾',magnet:'🧲 磁铁',boost:'⚡ 加速',ghost:'👻 幽灵'};
      toast(names[p.id]+'! '+{shield:'无敌6s',magnet:'吸金8s',boost:'2x分5s',ghost:'穿墙5s'}[p.id],'#00E5FF');
      sfx(300,550,.1,'triangle',.08);
      for(let i=0;i<8;i++)pts.push({x:p.x,y:p.y,vx:rng(-3,3),vy:rng(-4,-1),life:ri(12,24),ml:24,c:'#B388FF',sz:rng(2,4)});
    }
  }
  // ── Particles ──
  pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.04;p.life--});pts=pts.filter(p=>p.life>0);
  if(pts.length>45)pts.splice(0,pts.length-45);
  // ── Texts ──
  txts.forEach(t=>{t.y+=t.vy;t.life--});txts=txts.filter(t=>t.life>0);
  // ── Shake ──
  if(shake>0)shake=Math.max(0,shake-.55);
  // ── HUD ──
  D.hs.textContent=sc;
}

// ── Death ───────────────────────────────────────────────
function die(){
  gs='over';bgmStop();sfx(50,25,.35,'sawtooth',.13);shake=15;
  if(sc>best){best=sc;localStorage.setItem('cr_b',best)}
  for(let i=0;i<16;i++){
    pts.push({x:pl.x+pl.w/2,y:pl.y-pl.h/2,vx:rng(-5,5),vy:rng(-7,-1),life:ri(15,35),ml:35,c:ch.c1,sz:rng(2,5)});
  }
  setTimeout(()=>{
    if(gs!=='over')return;
    const isNew=sc>=best&&sc>0;
    D.ot.textContent=isNew?'🏆 新纪录!':'游戏结束';
    D.ot.className='over-title '+(isNew?'gold':'pink');
    if(isNew)D.ot.classList.add('pulse');
    D.os.textContent=sc;D.ob.innerHTML='最高 <span>'+best+'</span>';
    D.gtb.textContent=[
      'GLM 分析：坚持了 '+Math.floor(et())+' 秒，试试踩敌人获取额外分数。',
      'GLM 提示：最高连击 '+maxCombo+' 次，保持连击翻倍收益。',
      'GLM 洞察：已到达第 '+si+' 场景，注意新敌人类型。',
      'GLM 建议：顶问号方块拿道具，磁铁+加速刷分最快。'
    ][ri(0,3)];
    D.oo.classList.remove('hidden');
  },500);
  D.pb.style.display='none';D.qb.style.display='none';D.skb.style.display='none';
}

// ── Actions ─────────────────────────────────────────────
// _slideHeld: tracks whether down key/touch is actively held
let _slideHeld=false;

function doJump(){
  if(gs!=='playing'||!pl)return;
  // Coyote time: allow jump within grace frames after leaving ground
  const canGroundJump=pl.og||coyote>0;
  if(canGroundJump&&!pl.jp){
    pl.vy=C.JV*ch.jM;pl.jp=true;pl.og=false;coyote=0;djmp=false;pl.sq=1.18;pl.sqT=6;jmpHeld=true;jmpTimer=0;
    sfx(180,520,.1,'sine',.1);
  }else if(ch.dj&&!djmp&&pl.jp&&!pl.og){
    // Double jump (mid-air only, requires having already jumped)
    pl.vy=C.JV*ch.jM*.78;djmp=true;pl.sq=1.1;pl.sqT=5;jmpHeld=true;jmpTimer=0;
    sfx(320,750,.07,'sine',.08);
    for(let i=0;i<5;i++)pts.push({x:pl.x+pl.w/2,y:pl.y,vx:rng(-2,2),vy:rng(1,3),life:ri(6,14),ml:14,c:ch.c1,sz:rng(1.5,2.5)});
  }else{
    // Can't jump now → buffer it (will execute on landing)
    jumpBuf=C.JUMP_BUF_FRAMES;
  }
}
function doSlide(){
  if(gs!=='playing'||!pl||!pl.og)return;
  if(slide<=0){slide=C.MIN_SLIDE_FRAMES;pl.h=18;pl.sq=.68;pl.sqT=4;sfx(90,90,.1,'sawtooth',.04)}
  _slideHeld=true;
}
function doSlideRelease(){
  _slideHeld=false;
  // If past minimum safety frames, allow standing up
  // (slide counter continues regardless, but we stop enforcing矮身)
}
function doJumpRelease(){
  // Mario short hop: release jump early → clamp upward velocity
  if(pl&&pl.vy<C.SHORT_HOP_VY&&pl.jp){
    pl.vy=C.SHORT_HOP_VY;
  }
  jmpHeld=false;jmpTimer=C.MAX_HOLD; // stop hold boost
}

// ── Active Skill (Shift / X key) ────────────────────────
function doSkill(){
  if(gs!=='playing'||!pl||pl.skillCd>0)return;
  if(ch.id==='cat'){
    // Cat: 空中闪避冲刺 — brief invincibility burst while airborne
    if(!pl.og){
      ap.shield=(ap.shield||0)+9; // 150ms invincibility
      pl.skillCd=90; // 1.5s cooldown
      sfx(300,600,.08,'square',.08);
      toast('⚡ 空中冲刺!','#00E5FF');
      for(let i=0;i<8;i++)pts.push({x:pl.x+pl.w/2,y:pl.y-pl.h/2,vx:rng(3,8),vy:rng(-2,2),life:ri(6,14),ml:14,c:'#00E5FF',sz:rng(2,4)});
    }
  }else if(ch.id==='bunny'){
    // Bunny: 空中滑翔 — cap fall speed for gentle descent
    if(!pl.og&&pl.vy>0){
      pl.gliding=true;
      pl.skillCd=30; // short lock to prevent toggle spam
      sfx(200,400,.06,'sine',.06);
      toast('🪂 空中滑翔!','#FF4081');
    }else if(pl.gliding){
      pl.gliding=false; // toggle off
    }
  }else{ // dog
    // Dog: 铁壁滑铲 — brief shield while sliding
    if(slide>0||_slideHeld){
      ap.shield=(ap.shield||0)+18; // 0.3s invincibility
      pl.skillCd=120; // 2s cooldown
      sfx(100,300,.08,'triangle',.08);
      toast('🛡 铁壁滑铲!','#FFB74D');
      for(let i=0;i<6;i++)pts.push({x:pl.x+pl.w/2,y:pl.y,vx:rng(-2,2),vy:rng(-1,1),life:ri(6,12),ml:12,c:'#FFB74D',sz:rng(1.5,3)});
    }
  }
}
function togglePause(){
  if(gs==='playing'){gs='paused';jmpHeld=false;jumpBuf=0;_slideHeld=false;pt0=Date.now();D.po.classList.remove('hidden');if(actx&&actx.state==='running')actx.suspend()}
  else if(gs==='paused'){gs='playing';tpt+=Date.now()-pt0;D.po.classList.add('hidden');if(actx)actx.resume()}
}
function quitMenu(){
  bgmStop();gs='menu';rs();
  D.po.classList.add('hidden');D.oo.classList.add('hidden');D.hs.style.display='none';D.hr.style.display='none';
  D.pb.style.display='none';D.qb.style.display='none';D.skb.style.display='none';D.gb.style.display='none';D.gt.style.opacity='0';D.mo.classList.remove('hidden');
  if(ci>=0)startDemo(ci);
}

// ── Game flow ───────────────────────────────────────────
function startGame(){
  stopDemo();rs();ea();bgmStart();
  pl={x:W*.13,y:gy,w:28,h:38,vy:0,jp:false,og:true,sq:1,sqT:0,trail:[],af:0,_wasLanded:true,skilling:false,gliding:false,skillCd:0};
  gt0=Date.now();tpt=0;gs='playing';
  _slideHeld=false;coyote=C.COYOTE_FRAMES;jumpBuf=0;

  D.hs.style.display='';D.hr.style.display='';D.pb.style.display='flex';D.qb.style.display='flex';D.gb.style.display='';D.skb.style.display='flex';

}

// ── Draw character (PIXEL ART: pure fillRect, no ellipse/arc/curves) ──
function drawChar(ctx,c,x,y,w,h,af){
  ctx.save();ctx.translate(x,y);
  const p=2; // pixel unit — every coordinate is in multiples of p
  // Helper: draw pixel block at grid position (col,row) with pixel size (bw,bh)
  function px(col,row,bw,bh,color){ctx.fillStyle=color;ctx.fillRect(col*p,row*p,bw*p,bh*p)}
  ctx.shadowColor=c.c1;ctx.shadowBlur=5;

  if(c.id==='cat'){
    // ── CAT 🐱: triangle ears, slit eyes, whiskers, long curved tail ──
    // Left ear (triangle: tip at top, wider at base)
    px(-7,-18,1,1,c.c1);px(-6,-17,2,2,c.c1);px(-5,-15,1,1,c.c1);
    px(-6,-16,1,1,'rgba(255,160,190,.4)'); // inner pink
    // Right ear
    px(6,-18,1,1,c.c1);px(5,-17,2,2,c.c1);px(4,-15,1,1,c.c1);
    px(5,-16,1,1,'rgba(255,160,190,.4)');
    // Ear twitch animation
    if(Math.sin(af*.04)>0){px(-7,-19,1,1,c.c1);px(6,-19,1,1,c.c1)}

    // Head
    px(-5,-14,10,6,c.c1);  // main head block
    px(-3,-13,6,4,c.c2);   // lighter face center
    px(-5,-14,10,1,c.c1);  // head top edge (sharp)

    // Eyes (slanted rectangles with slit pupils)
    px(-4,-12,3,2,'#fff');   // left eye white
    px(-4,-11,2,1,'#2dd4a0'); // left iris green
    px(-4,-12,1,2,'#0a0a0a'); // left slit pupil (vertical line)
    px(-5,-13,1,1,'#fff');   // left highlight sparkle
    px(2,-12,3,2,'#fff');    // right eye white
    px(3,-11,2,1,'#2dd4a0'); // right iris green
    px(4,-12,1,2,'#0a0a0a'); // right slit pupil
    px(5,-13,1,1,'#fff');    // right highlight sparkle

    // Nose (small pink block)
    px(-1,-9,2,1,'#ff8a9e');
    // Mouth lines
    px(0,-8,1,1,'rgba(0,0,0,.2)');
    px(-2,-8,1,1,'rgba(0,0,0,.15)');px(2,-8,1,1,'rgba(0,0,0,.15)');

    // Whiskers (3 pixel lines each side)
    px(-7,-10,3,1,'rgba(255,255,255,.5)');
    px(-8,-9,4,1,'rgba(255,255,255,.4)');
    px(-7,-8,3,1,'rgba(255,255,255,.3)');
    px(4,-10,3,1,'rgba(255,255,255,.5)');
    px(4,-9,4,1,'rgba(255,255,255,.4)');
    px(4,-8,3,1,'rgba(255,255,255,.3)');

    // Body (sleek narrow)
    px(-3,-7,6,7,c.c1);     // main body
    px(-2,-6,4,4,c.c2);     // chest lighter
    px(-3,-7,1,7,c.c1);     // left edge sharp
    px(3,-7,1,7,c.c1);      // right edge sharp

    // Front legs
    px(-3,0,2,2,c.c1);px(1,0,2,2,c.c1);
    // Paws
    px(-3,2,2,1,c.c2);px(1,2,2,1,c.c2);

    // Tail (animated: 4 pixel segments curving behind)
    const tw=Math.sin(af*.06)>0?1:0;
    px(-5,-4,1,2,c.c1);px(-6+tw,-5,1,2,c.c1);px(-7+tw,-7,1,2,c.c1);px(-7+tw,-9,1,1,c.c1);
  }
  else if(c.id==='dog'){
    // ── DOG 🐶: floppy ears, wide muzzle, tongue, short wag tail ──
    // Floppy ears (hanging down from head sides)
    px(-8,-12,2,6,c.c1);    // left floppy ear
    px(-7,-11,1,5,'rgba(0,0,0,.1)'); // left inner shadow
    px(6,-12,2,6,c.c1);     // right floppy ear
    px(7,-11,1,5,'rgba(0,0,0,.1)'); // right inner shadow

    // Head (wider than cat)
    px(-6,-15,12,7,c.c1);   // main head
    px(-4,-14,8,5,c.c2);    // muzzle lighter area
    px(-2,-13,4,3,c.c2);    // muzzle center bright

    // Eyes (big puppy eyes — square blocks)
    px(-4,-14,3,2,'#fff');  // left eye white
    px(-4,-13,2,1,'#6b4226'); // left iris brown
    px(-4,-13,1,1,'#1a1a1a'); // left pupil
    px(-5,-14,1,1,'#fff');  // left big highlight
    px(-3,-14,1,1,'#fff');  // left small sparkle
    px(2,-14,3,2,'#fff');   // right eye white
    px(3,-13,2,1,'#6b4226'); // right iris
    px(4,-13,1,1,'#1a1a1a'); // right pupil
    px(5,-14,1,1,'#fff');   // right big highlight
    px(2,-14,1,1,'#fff');   // right sparkle

    // Eyebrows (expressive blocks)
    px(-5,-15,2,1,'rgba(0,0,0,.3)');px(4,-15,2,1,'rgba(0,0,0,.3)');

    // Nose (big black block with highlight)
    px(-1,-12,2,1,'#2a2a2a');
    px(0,-12,1,1,'rgba(255,255,255,.2)'); // nose shine

    // Tongue (poking out below nose)
    px(-1,-11,2,2,'#ff6b8a');
    px(0,-11,1,1,'#ff8a9e'); // tongue highlight

    // Mouth corners
    px(-2,-12,1,1,'rgba(0,0,0,.15)');px(2,-12,1,1,'rgba(0,0,0,.15)');

// ── Draw enemy ──────────────────────────────────────────
function drawEnemy(ctx,e){
  const alive=e.alive, sx=e.squash||1, sy=alive?1:.3;
  const x=e.x,y=e.y-(e.h||26)/2;
  ctx.save();ctx.translate(x,y+e.h/2);ctx.scale(sx,sy);ctx.translate(0,-e.h/2);

  if(e.type==='bot1'){
    // Simple walker
    ctx.fillStyle='#ff4444';ctx.shadowColor='#ff4444';ctx.shadowBlur=6;
    const bw=e.w||26,bh=e.h||26;
    ctx.beginPath();ctx.arc(bw/2,bh/2,bw/2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(bw/2-4,bh/2-3,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(bw/2+4,bh/2-3,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.arc(bw/2-4,bh/2-3,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(bw/2+4,bh/2-3,1.5,0,Math.PI*2);ctx.fill();
    // Feet
    if(alive){const fs=Math.sin(e.walkPh)*2;
      ctx.fillStyle='#cc3333';ctx.fillRect(bw/2-7,bh-4,5,4+fs);ctx.fillRect(bw/2+3,bh-4,5,4-fs);}
  }else if(e.type==='bot2'){
    // Spike bot
    ctx.fillStyle='#ff8c00';ctx.shadowColor='#ff8c00';ctx.shadowBlur=6;
    const bw=e.w||26,bh=e.h||26;
    ctx.beginPath();ctx.arc(bw/2,bh/2,bw/2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.arc(bw/2-3,bh/2-2,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(bw/2+3,bh/2-2,2,0,Math.PI*2);ctx.fill();
    // Spikes
    ctx.fillStyle='#ffcc00';
    for(let i=0;i<4;i++){const a=i/4*Math.PI*2+fr*.03;ctx.beginPath();ctx.arc(bw/2+Math.cos(a)*8,bh/2+Math.sin(a)*8,4,0,Math.PI*2);ctx.fill()}
  }else if(e.type==='bot3'){
    // Shield bot (must be stomped)
    ctx.fillStyle='#7b2d8e';ctx.shadowColor='#7b2d8e';ctx.shadowBlur=8;
    const bw=e.w||26,bh=e.h||26;
    ctx.beginPath();ctx.arc(bw/2,bh/2,bw/2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(bw/2-3,bh/2-2,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(bw/2+3,bh/2-2,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.arc(bw/2-3,bh/2-2,1,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(bw/2+3,bh/2-2,1,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(bw/2,bh/2,bw/2+2,0,Math.PI*2);ctx.stroke();
  }else{
    // Flyer
    ctx.fillStyle='#ff69b4';ctx.shadowColor='#ff69b4';ctx.shadowBlur=8;
    const bw=e.w||24,bh=e.h||20;
    ctx.beginPath();ctx.ellipse(bw/2,bh/2,bw/2,bh/2,0,0,Math.PI*2);ctx.fill();
    // Wings
    const wf=Math.sin(fr*.15)*3;
    ctx.fillStyle='rgba(255,255,255,.4)';
    ctx.beginPath();ctx.ellipse(bw/2-9,bh/2-2+wf,5,7,.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(bw/2+9,bh/2-2-wf,5,7,-.3,0,Math.PI*2);ctx.fill();
  }
  ctx.shadowBlur=0;ctx.restore();
}

// ── Draw coin (spinning 3D effect) ─────────────────────
function drawCoin(ctx,c){
  const spin=Math.abs(Math.cos(c.ph)); // simulate 3D spin
  ctx.save();ctx.translate(c.x,c.y);
  ctx.scale(spin,1);
  ctx.shadowColor='#FFD740';ctx.shadowBlur=6;
  // Outer
  ctx.fillStyle='#FFD740';ctx.beginPath();ctx.arc(0,0,C.COIN_R,0,Math.PI*2);ctx.fill();
  // Inner
  ctx.fillStyle='#FFF9C4';ctx.beginPath();ctx.arc(0,0,C.COIN_R*.72,0,Math.PI*2);ctx.fill();
  // Symbol
  if(spin>.3){ctx.fillStyle='#FFA000';ctx.font='bold 9px Orbitron,system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('¥',0,1)}
  ctx.shadowBlur=0;ctx.restore();
}

// ── Draw block ──────────────────────────────────────────
function drawBlock(ctx,b){
  const bx=b.x,by=b.y-b.h-b.bounce;
  ctx.save();
  // Glow
  ctx.shadowColor=b.used?'rgba(255,255,255,.1)':'#FFD740';ctx.shadowBlur=b.used?2:8;
  ctx.fillStyle=b.used?'#3a3a4a':'#FFA000';
  ctx.strokeStyle=b.used?'#555':'#FFD740';ctx.lineWidth=2;
  // Rounded rect
  const r=4;
  ctx.beginPath();ctx.moveTo(bx+r,by);ctx.lineTo(bx+b.w-r,by);
  ctx.arcTo(bx+b.w,by,bx+b.w,by+r,r);ctx.lineTo(bx+b.w,by+b.h-r);
  ctx.arcTo(bx+b.w,by+b.h,bx+b.w-r,by+b.h,r);ctx.lineTo(bx+r,by+b.h);
  ctx.arcTo(bx,by+b.h,bx,by+b.h-r,r);ctx.lineTo(bx,by+r);
  ctx.arcTo(bx,by,bx+r,by,r);ctx.closePath();ctx.fill();ctx.stroke();
  // Question mark
  if(!b.used){
    ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font='bold 16px Orbitron,system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('?',bx+b.w/2,by+b.h/2);
  }
  ctx.shadowBlur=0;ctx.restore();
}

// ── Draw platform ───────────────────────────────────────
function drawPlatform(ctx,p){
  ctx.save();
  ctx.fillStyle='rgba(0,229,255,.15)';ctx.shadowColor='#00E5FF';ctx.shadowBlur=6;
  ctx.strokeStyle='#00E5FF';ctx.lineWidth=1.5;ctx.globalAlpha=.8;
  const r=5,px=p.x,py=p.y-p.h;
  ctx.beginPath();ctx.moveTo(px+r,py);ctx.lineTo(px+p.w-r,py);
  ctx.arcTo(px+p.w,py,px+p.w,py+r,r);ctx.lineTo(px+p.w,py+p.h-r);
  ctx.arcTo(px+p.w,py+p.h,px+p.w-r,py+p.h,r);ctx.lineTo(px+r,py+p.h);
  ctx.arcTo(px,py+p.h,px,py+p.h-r,r);ctx.lineTo(px,py+r);
  ctx.arcTo(px,py,px+r,py,r);ctx.closePath();ctx.fill();ctx.stroke();
  // Grid lines on top
  ctx.strokeStyle='rgba(0,229,255,.25)';ctx.lineWidth=.5;
  for(let lx=px+6;lx<px+p.w;lx+=10){ctx.beginPath();ctx.moveTo(lx,py+1);ctx.lineTo(lx,py+3);ctx.stroke()}
  ctx.shadowBlur=0;ctx.globalAlpha=1;ctx.restore();
}

// ── Draw powerup ────────────────────────────────────────
function drawPup(ctx,p){
  ctx.save();ctx.translate(p.x,p.y);
  const bob=Math.sin(p.ph)*2;
  ctx.translate(0,bob);
  const colors={shield:'#00E5FF',magnet:'#B388FF',boost:'#FFD740',ghost:'#69F0AE'};
  const icons={shield:'S',magnet:'M',boost:'B',ghost:'G'};
  const col=colors[p.id]||'#fff';
  ctx.shadowColor=col;ctx.shadowBlur=14;
  ctx.strokeStyle=col;ctx.globalAlpha=.4;ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,14,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle=col;ctx.globalAlpha=.85;ctx.beginPath();ctx.arc(0,0,12,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;ctx.font='bold 11px Orbitron,system-ui';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(icons[p.id]||'?',0,1);
  ctx.shadowBlur=0;ctx.restore();
}

// ── Draw obstacle ───────────────────────────────────────
function drawObstacle(ctx,o,ac){
  ctx.save();
  const oy=o.y-o.h-(o.oy||0);
  ctx.shadowColor=ac;ctx.shadowBlur=8;
  if(o.type==='spike'){
    ctx.fillStyle=ac;ctx.beginPath();
    ctx.moveTo(o.x+o.w/2,oy);ctx.lineTo(o.x,oy+o.h);ctx.lineTo(o.x+o.w,oy+o.h);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.15)';
    ctx.beginPath();ctx.moveTo(o.x+o.w/2,oy+5);ctx.lineTo(o.x+5,oy+o.h);ctx.lineTo(o.x+o.w/2,oy+o.h);ctx.closePath();ctx.fill();
  }else if(o.type==='barrier'){
    ctx.fillStyle=ac;ctx.globalAlpha=.65;
    ctx.fillRect(o.x,oy,o.w,o.h);
    ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=1;ctx.strokeRect(o.x,oy,o.w,o.h);
    // Cross pattern
    ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=.5;
    ctx.beginPath();ctx.moveTo(o.x,oy);ctx.lineTo(o.x+o.w,oy+o.h);ctx.stroke();
    ctx.beginPath();ctx.moveTo(o.x+o.w,oy);ctx.lineTo(o.x,oy+o.h);ctx.stroke();
  }else if(o.type==='hover'){
    ctx.fillStyle=ac;ctx.globalAlpha=.5;
    ctx.beginPath();ctx.ellipse(o.x+o.w/2,oy+o.h/2,o.w/2,o.h/2,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.3)';ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);
  }else if(o.type==='moving'){
    ctx.fillStyle=ac;ctx.globalAlpha=.65;
    ctx.beginPath();ctx.arc(o.x+o.w/2,oy+o.h/2,Math.max(o.w,o.h)/2,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#fff';ctx.globalAlpha=.15;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(o.x+o.w/2,oy+o.h/2,Math.max(o.w,o.h)/2+3,0,Math.PI*2);ctx.stroke();
  }else if(o.type==='laser'){
    ctx.fillStyle='rgba(255,50,50,.8)';ctx.shadowColor='#ff0000';ctx.shadowBlur=16;
    ctx.fillRect(o.x,oy,o.w,o.h);
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillRect(o.x,oy,o.w,Math.max(1,o.h*.2));
  }
  ctx.shadowBlur=0;ctx.globalAlpha=1;ctx.restore();
}

// ── Menu scene ──────────────────────────────────────────
function drawMenu(){
  maf++;
  const cv2=D.ccv,ctx2=cv2.getContext('2d'),cw=cv2.width,ch2=cv2.height;
  // Gradient bg
  const g=ctx2.createLinearGradient(0,0,0,ch2);g.addColorStop(0,'#4a90d9');g.addColorStop(1,'#1a2a50');
  ctx2.fillStyle=g;ctx2.fillRect(0,0,cw,ch2);
  // Ground
  ctx2.fillStyle='#0d2818';ctx2.fillRect(0,ch2*.78,cw,ch2*.22);
  ctx2.strokeStyle='rgba(0,229,255,.1)';ctx2.lineWidth=1;
  for(let x=0;x<cw;x+=20){let lx=(x+maf*.2)%cw;ctx2.beginPath();ctx2.moveTo(lx,ch2*.78);ctx2.lineTo(lx-8,ch2);ctx2.stroke()}
  // Clouds
  for(let i=0;i<4;i++){const cx2=((i*100+maf*.1)%(cw+120))-60;ctx2.fillStyle='rgba(255,255,255,.4)';
    ctx2.beginPath();ctx2.ellipse(cx2,ch2*.25,35,14,0,0,Math.PI*2);ctx2.fill()}

  // Characters
  const gap=cw/3;
  C.CH.forEach((c,i)=>{
    ctx2.save();
    const cx3=gap*i+gap/2,cy3=ch2/2;
    const scale=i===ci?1.14:.9;
    ctx2.translate(cx3,cy3);ctx2.scale(scale,scale);
    if(i!==ci){ctx2.globalAlpha=.5;ctx2.filter='saturate(0.2)'}
    drawChar(ctx2,c,0,0,34,40,maf+i*15);
    ctx2.filter='none';ctx2.globalAlpha=1;
    ctx2.fillStyle=c.c1;ctx2.font='bold 12px Orbitron,system-ui';ctx2.textAlign='center';
    ctx2.fillText(c.name,0,32);
    ctx2.font='8px Orbitron,system-ui';ctx2.fillStyle='rgba(255,255,255,.35)';
    ctx2.fillText(c.desc,0,44);
    ctx2.fillStyle=c.c1;ctx2.font='7px Orbitron,system-ui';
    ctx2.fillText(c.skill||'',0,55);
    if(i===ci){ctx2.fillStyle='#FFD740';ctx2.font='bold 10px Orbitron,system-ui';ctx2.fillText('✦ 已选',0,55)}
    ctx2.restore();
  });
  ctx2.fillStyle='rgba(255,255,255,.2)';ctx2.font='9px Orbitron,system-ui';ctx2.textAlign='center';
  ctx2.fillText('← 点击角色切换 →',cw/2,ch2-16);
}

// ── Demo Canvas（角色能力展示 · 新手教学）──────────────
let dmoT=0, dmoCi=-1, dmoPl=null, dmoOb=[], dmoCoins=[], dmoPups=[], dmoTxts=[], dmoPaused=false;
const DMO_W=340, DMO_H=140, DMO_GY=DMO_H*.76;

// 每个角色的演示脚本：{t, 描述}
// 猫：先普通跳躲地刺，再二段跳过激光门
// 狗：滑铲过低栏，跳跃穿过密集地刺（展示小碰撞箱）
// 兔：普通跳过地刺，二段跳上高平台吃金币
const DMO_SCRIPT={
  cat:{dur:7.5, title:'🐱 霓虹猫 · 二段跳', desc:'普通跳跃 + 空中二段跳', keyT:3.5, keyTxt:'二段跳!',keyC:'#00E5FF',

    acts:[{t:1.15,act:'jump'},{t:1.6,act:'land'},{t:2.65,act:'jump'},{t:3.0,act:'djump'},{t:3.8,act:'land'}],
    coins:[{t:3.0,x:200,y:-80},{t:3.15,x:220,y:-95},{t:3.3,x:240,y:-80}]
  },
  dog:{dur:7.5, title:'🐶 霓虹狗 · 滑铲+坚韧', desc:'滑铲过低障碍 · 更小碰撞箱', keyT:3.0, keyTxt:'小碰撞箱!',keyC:'#FFB74D',
    obs:[{t:1.0,x:280,type:'barrier',h:16},{t:2.5,x:340,type:'spike',h:22},{t:3.0,x:310,type:'spike',h:16},{t:4.8,x:280,type:'barrier',h:14}],
    acts:[{t:1.1,act:'slide'},{t:1.9,act:'stand'},{t:2.65,act:'jump'},{t:3.3,act:'land'},{t:4.9,act:'slide'},{t:5.7,act:'stand'}],

    obs:[{t:1.0,x:290,type:'spike',h:28},{t:3.0,x:240,type:'laser',h:55,gap:65}],
    acts:[{t:1.15,act:'jump'},{t:1.6,act:'land'},{t:3.15,act:'jump'},{t:3.55,act:'djump'},{t:4.3,act:'land'}],
    coins:[{t:3.3,x:195,y:-105},{t:3.5,x:220,y:-120},{t:3.7,x:245,y:-105},{t:5.2,x:160,y:-50},{t:5.4,x:180,y:-55}]
  }
};

function startDemo(ci){
  dmoCi=ci; dmoT=0; dmoOb=[]; dmoCoins=[]; dmoPups=[]; dmoTxts=[]; dmoPaused=false;
  dmoPl={x:50,y:DMO_GY,w:22,h:30,vy:0,og:true,jp:false,af:0,sq:1,slide:false};
  D.dcv.style.display='';
}
function stopDemo(){dmoCi=-1;D.dcv.style.display='none'}

function updateDemo(dt){
  if(dmoCi<0)return;
  const dur=DMO_SCRIPT[C.CH[dmoCi].id].dur;
  dmoT+=dt; if(dmoT>=dur){dmoT=0;dmoOb=[];dmoCoins=[];dmoPups=[];dmoTxts=[];dmoPl.x=50;dmoPl.y=DMO_GY;dmoPl.vy=0;dmoPl.og=true;dmoPl.jp=false;dmoPl.slide=false;dmoPl.sq=1}
  const sc=DMO_SCRIPT[C.CH[dmoCi].id];
  const chD=C.CH[dmoCi];

  // Process scripted actions
  for(const a of sc.acts){
    if(Math.abs(dmoT-a.t)<.08){
      if(a.act==='jump'){
        dmoPl.vy=chD.dj?-9.5:-9;
        dmoPl.jp=true;dmoPl.og=false;dmoPl.sq=1.15;
      }else if(a.act==='djump'){
        if(chD.dj){dmoPl.vy=-7.8;dmoPl.sq=1.1}
        dmoTxts.push({t:dmoT,txt:sc.keyTxt,c:sc.keyC,life:1.5});
      }else if(a.act==='land'){dmoPl.y=DMO_GY;dmoPl.vy=0;dmoPl.jp=false;dmoPl.og=true;dmoPl.sq=.82}
      else if(a.act==='slide'){dmoPl.slide=true;dmoPl.h=22;dmoPl.sq=.7}
      else if(a.act==='stand'){dmoPl.slide=false;dmoPl.h=30;dmoPl.sq=1.05}
    }
  }
  // Process obstacles (move them in)
  const spd=1.6;
  for(const o of sc.obs){
    const ox=DMO_W+20-(dmoT-o.t)*spd*60;
    const existing=dmoOb.find(e=>e._t===o.t);
    if(!existing&&ox<DMO_W+20&&ox>-60){
      if(o.type==='laser'){
        dmoOb.push({_t:o.t,type:'laser',x:ox,y:DMO_GY,gap:o.gap,h:o.h});
      }else{
        dmoOb.push({_t:o.t,type:o.type,x:ox,y:DMO_GY,h:o.h,w:o.type==='barrier'?50:22});
      }
    }
    if(existing){
      existing.x=DMO_W+20-(dmoT-o.t)*spd*60;
    }
  }
  // Coins
  for(const c of sc.coins){
    const cx2=DMO_W+20-(dmoT-c.t)*spd*60;
    const existing=dmoCoins.find(e=>e._t===c.t);
    if(!existing&&cx2<DMO_W+20&&cx2>-20){
      dmoCoins.push({_t:c.t,x:cx2,y:DMO_GY+c.y,got:false,ph:0});
    }
    if(existing){existing.x=cx2}
  }
  // Check coin collection
  for(const c of dmoCoins){
    if(c.got)continue;
    if(!dmoPl.slide&&Math.hypot(dmoPl.x+11-c.x,DMO_GY-dmoPl.h/2-c.y)<16){c.got=true}
    else if(dmoPl.slide&&Math.hypot(dmoPl.x+11-c.x,DMO_GY-11-c.y)<14){c.got=true}
  }
  // Remove off-screen entities
  dmoOb=dmoOb.filter(o=>o.x>-60);
  dmoCoins=dmoCoins.filter(c=>c.x>-20&&!c.got);
  // Fade texts
  dmoTxts=dmoTxts.filter(t=>dmoT-t.t<t.life);
  // Player physics
  if(!dmoPl.og){dmoPl.vy+=.42;dmoPl.y+=dmoPl.vy;if(dmoPl.y>=DMO_GY){dmoPl.y=DMO_GY;dmoPl.vy=0;dmoPl.jp=false;dmoPl.og=true;dmoPl.sq=.82}}
  dmoPl.af++;dmoPl.sq=1+(dmoPl.sq-1)*.85; // squash recovery
  if(dmoPl.slide)dmoPl.h=22;else if(!dmoPl.slide&&dmoPl.h<30)dmoPl.h=Math.min(30,dmoPl.h+.6);
}

function drawDemo(){
  if(dmoCi<0)return;
  const cv2=D.dcv,ctx2=cv2.getContext('2d');
  ctx2.clearRect(0,0,DMO_W,DMO_H);
  // Sky
  const g=ctx2.createLinearGradient(0,0,0,DMO_GY);g.addColorStop(0,'#4a90d9');g.addColorStop(1,'#1a2a50');
  ctx2.fillStyle=g;ctx2.fillRect(0,0,DMO_W,DMO_H);
  // Clouds
  ctx2.fillStyle='rgba(255,255,255,.3)';
  for(let i=0;i<3;i++){const cx2=((i*100+dmoT*15)%(DMO_W+100))-50;ctx2.beginPath();ctx2.ellipse(cx2,DMO_H*.2,28,10,0,0,Math.PI*2);ctx2.fill()}
  // Ground
  ctx2.fillStyle='#0d2818';ctx2.fillRect(0,DMO_GY,DMO_W,DMO_H-DMO_GY);
  ctx2.strokeStyle='rgba(0,229,255,.08)';ctx2.lineWidth=.8;
  for(let x=-(dmoT*10%20);x<DMO_W+20;x+=20){ctx2.beginPath();ctx2.moveTo(x,DMO_GY);ctx2.lineTo(x-8,DMO_H);ctx2.stroke()}
  ctx2.strokeStyle='rgba(0,229,255,.5)';ctx2.lineWidth=1.5;ctx2.beginPath();ctx2.moveTo(0,DMO_GY);ctx2.lineTo(DMO_W,DMO_GY);ctx2.stroke();

  // Obstacles
  const chD=C.CH[dmoCi];
  dmoOb.forEach(o=>{
    ctx2.save();ctx2.shadowColor=chD.c1;ctx2.shadowBlur=5;
    if(o.type==='spike'){
      ctx2.fillStyle=chD.c1;ctx2.beginPath();ctx2.moveTo(o.x+o.w/2,o.y-o.h);ctx2.lineTo(o.x,o.y);ctx2.lineTo(o.x+o.w,o.y);ctx2.closePath();ctx2.fill();
    }else if(o.type==='barrier'){
      ctx2.fillStyle=chD.c1;ctx2.globalAlpha=.6;ctx2.fillRect(o.x,DMO_GY-o.h,o.w,o.h);
      ctx2.strokeStyle='rgba(255,255,255,.2)';ctx2.strokeRect(o.x,DMO_GY-o.h,o.w,o.h);
    }else if(o.type==='laser'){
      const gy=DMO_GY-o.gap;
      ctx2.fillStyle='rgba(255,50,50,.7)';ctx2.fillRect(o.x,gy-o.h,o.w,o.h);
      ctx2.fillStyle='rgba(255,255,255,.3)';ctx2.fillRect(o.x,gy-o.h,o.w,Math.max(1,o.h*.15));
    }
    ctx2.shadowBlur=0;ctx2.globalAlpha=1;ctx2.restore();
  });

  // Coins
  dmoCoins.forEach(c=>{
    if(c.got)return;c.ph+=.05;
    const spin=Math.abs(Math.cos(c.ph));
    ctx2.save();ctx2.translate(c.x,c.y);ctx2.scale(spin,1);ctx2.shadowColor='#FFD740';ctx2.shadowBlur=4;
    ctx2.fillStyle='#FFD740';ctx2.beginPath();ctx2.arc(0,0,8,0,Math.PI*2);ctx2.fill();ctx2.fillStyle='#FFF9C4';ctx2.beginPath();ctx2.arc(0,0,5.5,0,Math.PI*2);ctx2.fill();
    ctx2.shadowBlur=0;ctx2.restore();
  });

  // Player
  ctx2.save();
  const sq2=dmoPl.sq||1;
  const py2=dmoPl.y;
  ctx2.translate(dmoPl.x+dmoPl.w/2,py2);
  if(!dmoPl.slide){ctx2.scale(2-sq2,sq2);ctx2.translate(0,-dmoPl.h/2)}
  else{ctx2.translate(0,-dmoPl.h/2)}
  const bob2=dmoPl.og?Math.sin(dmoPl.af*.35)*1.5:0;ctx2.translate(0,bob2);
  ctx2.scale(1,1);
  drawChar(ctx2,chD,0,8,30,36,dmoPl.af);
  ctx2.restore();

  // Tutorial text
  const sc=DMO_SCRIPT[C.CH[dmoCi].id];
  for(const t of dmoTxts){
    const a=Math.min(1,1-(dmoT-t.t)/t.life);
    ctx2.save();ctx2.globalAlpha=a;ctx2.font='bold 15px Orbitron,system-ui';ctx2.fillStyle=t.c;ctx2.textAlign='center';
    ctx2.fillText(t.txt,dmoPl.x+dmoPl.w/2,DMO_GY-50-(dmoT-t.t)*20);ctx2.restore();
  }

  // Title bar
  ctx2.fillStyle='rgba(0,0,0,.55)';ctx2.fillRect(0,0,DMO_W,22);
  ctx2.font='bold 9px Orbitron,system-ui';ctx2.fillStyle='#fff';ctx2.textAlign='left';ctx2.fillText(sc.title,8,15);
  ctx2.font='7px Orbitron,system-ui';ctx2.fillStyle='rgba(255,255,255,.45)';ctx2.textAlign='right';ctx2.fillText(sc.desc,DMO_W-8,15);

  // Progress bar
  const p=(dmoT%sc.dur)/sc.dur;
  ctx2.fillStyle='rgba(255,255,255,.08)';ctx2.fillRect(0,DMO_H-3,DMO_W,3);
  ctx2.fillStyle=chD.c1;ctx2.fillRect(0,DMO_H-3,DMO_W*p,3);
}
// ── Game render ─────────────────────────────────────────
function drawGame(){
  const scc=C.SC[si],ac=scc.ac;
  const cx=D.cv.getContext('2d');
  cx.clearRect(0,0,W,H);

  // ── Sky gradient ──
  const sky=cx.createLinearGradient(0,0,0,gy);sky.addColorStop(0,scc.sky[0]);sky.addColorStop(1,scc.sky[1]);
  cx.fillStyle=sky;cx.fillRect(0,0,W,gy);

  // ── Clouds ──
  cx.globalAlpha=.35;
  for(let i=0;i<5;i++){
    const cx2=((i*170+dist*.025)%(W+200))-100,cy2=gy*.12+(i%3)*gy*.14;
    cx.fillStyle='#fff';cx.beginPath();cx.ellipse(cx2,cy2,40+Math.sin(i)*15,14,0,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.ellipse(cx2+25,cy2-4,22,10,0,0,Math.PI*2);cx.fill();
  }
  cx.globalAlpha=1;

  // ── Stars (fade in at higher scenes) ──
  if(si>=2){
    for(let i=0;i<20;i++){
      const sx=((i*143+dist*.01)%W+W)%W,sy=(i*67%gy*.7);
      cx.fillStyle='rgba(255,255,255,'+(.3+Math.sin(fr*.02+i)*.2)+')';cx.beginPath();cx.arc(sx,sy,.5,0,Math.PI*2);cx.fill()
    }
  }

  // ── Mountains ──
  cx.globalAlpha=.12;
  for(let i=0;i<6;i++){
    const mx=((i*W/4-dist*.015)%(W+300)+W+300)%(W+300)-150;
    const mh=gy*.15+Math.abs(Math.sin(i*1.8))*gy*.2;
    cx.fillStyle=ac;cx.beginPath();cx.moveTo(mx-70,gy);cx.lineTo(mx,gy-mh);cx.lineTo(mx+70,gy);cx.closePath();cx.fill();
    cx.fillStyle='rgba(0,0,0,.5)';cx.beginPath();cx.moveTo(mx,gy-mh);cx.lineTo(mx+70,gy);cx.lineTo(mx+90,gy);cx.closePath();cx.fill();
  }
  cx.globalAlpha=1;

  // ── Ground ──
  cx.fillStyle=scc.gr;cx.fillRect(0,gy,W,H-gy);
  // Grid lines
  cx.strokeStyle=scc.ac;cx.globalAlpha=.06;cx.lineWidth=1;
  for(let x=-(dist%30);x<W+30;x+=30){cx.beginPath();cx.moveTo(x,gy);cx.lineTo(x-12,H);cx.stroke()}
  // Top edge glow
  cx.globalAlpha=.65;cx.shadowColor=ac;cx.shadowBlur=10;cx.strokeStyle=ac;cx.lineWidth=2;
  cx.beginPath();cx.moveTo(0,gy);cx.lineTo(W,gy);cx.stroke();cx.shadowBlur=0;cx.globalAlpha=1;
  // Top highlights
  cx.strokeStyle='rgba(255,255,255,.08)';cx.lineWidth=1;
  for(let x=-(dist%16);x<W+16;x+=16){cx.beginPath();cx.moveTo(x,gy+1);cx.lineTo(x+6,gy+1);cx.stroke()}

  // ── Platforms ──
  platforms.forEach(p=>drawPlatform(cx,p));

  // ── Blocks ──
  blocks.forEach(b=>drawBlock(cx,b));

  // ── Obstacles ──
  obs.forEach(o=>drawObstacle(cx,o,ac));

  // ── Enemies ──
  enemies.forEach(e=>{if(!e.alive&&e.squash<.4)e.y=gy-3;drawEnemy(cx,e)});

  // ── Coins ──
  coins.forEach(c=>{if(!c.got)drawCoin(cx,c)});

  // ── Powerups ──
  pups.forEach(p=>{if(!p.got)drawPup(cx,p)});

  if(!pl)return;

  // Screen shake
  const sx=shake?rng(-shake,shake):0,sy=shake?rng(-shake,shake):0;
  cx.save();cx.translate(sx,sy);

  // ── Player trail ──
  pl.trail.forEach(t=>{cx.save();cx.globalAlpha=t.a*.25;cx.fillStyle=ch.c1;cx.fillRect(t.x,t.y-t.h,t.w,t.h);cx.restore()});

  // ── Player ──
  cx.save();
  const sq=pl.sq||1;
  cx.translate(pl.x+pl.w/2,pl.y);
  cx.scale(2-sq,sq);
  cx.translate(0,-(pl.h||38)/2);
  const bob=pl.og?Math.sin(pl.af*.38)*2:0;
  cx.translate(0,bob);
  // Effects
  if(ap.shield){cx.strokeStyle='#00E5FF';cx.globalAlpha=.45+Math.sin(fr*.15)*.2;cx.lineWidth=2.5;cx.beginPath();cx.arc(0,-2,22,0,Math.PI*2);cx.stroke();cx.globalAlpha=1}
  if(ap.ghost)cx.globalAlpha=.5;
  drawChar(cx,ch,0,0,30,pl.h||38,pl.af);
  cx.globalAlpha=1;cx.restore();

  // ── Skill visual effects ──
  if(pl.gliding){
    // Bunny glide: pink glow underneath + ear spread indicator
    cx.save();cx.globalAlpha=.3+Math.sin(fr*.1)*.1;
    cx.fillStyle='#FF4081';cx.fillRect(pl.x-4,pl.y,pl.w+8,4);
    cx.globalAlpha=1;cx.restore();
  }
  if(ap.shield&&pl.skillCd>0&&ch.id==='cat'){
    // Cat dash: cyan flash streaks
    cx.save();cx.globalAlpha=.4;
    cx.fillStyle='#00E5FF';
    for(let i=0;i<3;i++){cx.fillRect(pl.x+pl.w+4+i*6,pl.y-pl.h+i*4,8,2)}
    cx.globalAlpha=1;cx.restore();
  }

  // ── Particles ──
  pts.forEach(p=>{const a=p.life/p.ml;cx.save();cx.globalAlpha=a;cx.fillStyle=p.c;cx.beginPath();cx.arc(p.x,p.y,Math.max(.4,p.sz*a),0,Math.PI*2);cx.fill();cx.restore()});
  // ── Texts ──
  txts.forEach(t=>{const a=t.life/t.ml;cx.save();cx.globalAlpha=a;cx.font=`bold ${t.s||10}px Orbitron,system-ui`;cx.fillStyle=t.c;cx.textAlign='center';cx.fillText(t.t,t.x,t.y);cx.restore()});

  // ── Tutorial ──
  if(gs==='playing'&&et()<5){
    const te=et(),tx=pl.x+pl.w/2,ty=pl.y-pl.h-28,bs=Math.sin(te*4)*8;
    cx.save();cx.globalAlpha=.5+Math.sin(te*3)*.3;
    cx.fillStyle='#fff';cx.shadowColor='#fff';cx.shadowBlur=6;
    cx.beginPath();cx.moveTo(tx,ty-15+bs);cx.lineTo(tx-10,ty+bs);cx.lineTo(tx+10,ty+bs);cx.closePath();cx.fill();
    cx.font='bold 10px Orbitron,system-ui';cx.textAlign='center';cx.fillText('按空格跳',tx,ty-22+bs);
    cx.shadowBlur=0;cx.restore();
  }

  // ── Active powerups ──
  let pux=12,puy=48;
  for(const k in ap){
    const colors={shield:'#00E5FF',magnet:'#B388FF',boost:'#FFD740',ghost:'#69F0AE'};
    const icons={shield:'S',magnet:'M',boost:'B',ghost:'G'};
    cx.save();cx.globalAlpha=.8;cx.fillStyle=colors[k]||'#fff';cx.font='bold 13px Orbitron,system-ui';cx.textAlign='left';
    cx.fillText(icons[k]||'?',pux,puy);
    cx.font='8px Orbitron,system-ui';cx.fillStyle='rgba(255,255,255,.45)';
    cx.fillText((ap[k]/60).toFixed(1)+'s',pux+1,puy+13);cx.restore();
    pux+=38;
  }

  // ── Skill cooldown indicator on button ──
  if(skillCd>0){
    D.skb.style.opacity=.3;D.skb.style.pointerEvents='none';
  }else{
    D.skb.style.opacity='1';D.skb.style.pointerEvents='';
  }

  cx.restore(); // shake restore

  // ── Death flash ──
  if(gs==='over'){cx.globalAlpha=Math.min(.35,shake/15);cx.fillStyle='#fff';cx.fillRect(-20,-20,W+40,H+40);cx.globalAlpha=1}
}

// ── Main loop ───────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  if(gs==='menu'){drawMenu();if(dmoCi>=0){updateDemo(1/60);drawDemo()}}
  else if(gs==='playing'){update();drawGame()}
  else if(gs==='paused'){drawGame();D.cv.getContext('2d').fillStyle='rgba(0,0,0,.35)';D.cv.getContext('2d').fillRect(0,0,W,H)}
  else if(gs==='over'){
    pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.04;p.life--});pts=pts.filter(p=>p.life>0);
    if(shake>0)shake=Math.max(0,shake-.55);
    drawGame();
    D.cv.getContext('2d').fillStyle='rgba(0,0,0,.25)';D.cv.getContext('2d').fillRect(0,0,W,H);
  }
}

// ── Init ────────────────────────────────────────────────
function init(){
  resize();window.addEventListener('resize',resize);
  best=parseInt(localStorage.getItem('cr_b')||'0');
  const saved=localStorage.getItem('cr_c');if(saved){const i=C.CH.findIndex(c=>c.id===saved);if(i>=0)selChar(i)}
  const savedN=localStorage.getItem('cr_n');if(savedN)D.ni.value=savedN;
  D.ni.addEventListener('input',e=>localStorage.setItem('cr_n',e.target.value));

  D.sb.addEventListener('click',()=>{if(ch)startGame()});
  D.pb.addEventListener('click',togglePause);
  D.qb.addEventListener('click',()=>{if(gs==='playing'||gs==='paused')quitMenu()});
  D.skb.addEventListener('click',()=>{if(gs==='playing')doSkill()});
  D.rb.addEventListener('click',togglePause);
  D.q1.addEventListener('click',quitMenu);D.q2.addEventListener('click',quitMenu);
  D.re.addEventListener('click',()=>{D.oo.classList.add('hidden');startGame()});

  D.ccv.addEventListener('pointerdown',e=>{
    if(gs!=='menu')return;const r=D.ccv.getBoundingClientRect();
    const mx=(e.clientX-r.left)/r.width*D.ccv.width;
    const idx=Math.floor(mx/(D.ccv.width/3));if(idx>=0&&idx<3)selChar(idx);
  });

  // Keyboard
  document.addEventListener('keydown',e=>{
    if(gs==='menu'&&(e.code==='Space'||e.code==='Enter')){e.preventDefault();if(ch)startGame();return}
    if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();doJump()}
    if(e.code==='ArrowDown'){e.preventDefault();doSlide()}
    if(e.code==='Escape'||e.code==='KeyP'){e.preventDefault();togglePause()}
    if(e.code==='ShiftLeft'||e.code==='KeyX'){e.preventDefault();doSkill()}
  });
  document.addEventListener('keyup',e=>{
    if(e.code==='Space'||e.code==='ArrowUp'){doJumpRelease()}
    if(e.code==='ArrowDown'){doSlideRelease()}
  });

  // Touch
  document.addEventListener('pointerdown',e=>{
    if(gs!=='playing')return;if(e.target.tagName==='BUTTON'||e.target.tagName==='INPUT')return;
    e.preventDefault();
    const y=e.clientY;
    if(y<H*.55){doJump();_touchJump=true}else{doSlide()}
  },{passive:false});
  let _touchJump=false;
  document.addEventListener('pointerup',e=>{
    if(_touchJump){doJumpRelease();_touchJump=false}
    doSlideRelease();
  });

  requestAnimationFrame(loop);
}

function resize(){
  const d=C.DPR;W=innerWidth;H=innerHeight;
  D.cv.width=W*d;D.cv.height=H*d;D.cv.style.width=W+'px';D.cv.style.height=H+'px';
  D.cv.getContext('2d').setTransform(d,0,0,d,0,0);gy=Math.floor(H*C.GR);
  if(pl)pl.y=Math.min(pl.y,gy);
}

document.addEventListener('DOMContentLoaded',init);
</script>
</body></html>
